{% extends 'base.html' %}



{% load static %}



{% block title %}
Profile
{% endblock %}



{% block content %}



<h2>My Profile</h2>



<div class="card">


<img src="{% static 'images/profile.jpg' %}"
width="120"
height="120">



<h3>
{{ profile.name }}
</h3>


<p>
Registration:
{{ profile.registration }}
</p>


<p>
Course:
{{ profile.course }}
</p>



</div>



{% endblock %}
