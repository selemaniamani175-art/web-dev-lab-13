{% extends 'base.html' %}



{% block title %}
Courses
{% endblock %}



{% block content %}


<h2>Courses List</h2>



<table>


<tr>

<th>Code</th>
<th>Name</th>
<th>Duration</th>

</tr>



{% for course in courses %}



<tr>

<td>
{{ course.code }}
</td>


<td>
{{ course.name }}
</td>


<td>
{{ course.duration }}
</td>


</tr>



{% empty %}


<tr>

<td colspan="3">
No courses available
</td>

</tr>



{% endfor %}



</table>



{% endblock %}
