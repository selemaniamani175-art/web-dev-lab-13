{% extends 'base.html' %}



{% block title %}
Students
{% endblock %}



{% block content %}


<h2>Students List</h2>


<table>


<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Course</th>
    <th>Year</th>
</tr>



{% for student in students %}


<tr>

<td>
{{ student.id }}
</td>


<td>
{{ student.name }}
</td>


<td>
{{ student.course }}
</td>


<td>
{{ student.year }}
</td>


</tr>


{% empty %}

<tr>
<td colspan="4">
No students available
</td>
</tr>


{% endfor %}



</table>


{% endblock %}
